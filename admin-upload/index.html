<!doctype html>

<html lang="hi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>एडमिन डैशबोर्ड - सटुन कंस्ट्रक्शन पोर्टफोलियो</title>
    <meta name="description" content="सटुन कंस्ट्रक्शन के लिए मीडिया अपलोड और प्रोजेक्ट प्रबंधन का एडमिन कंसोल।" />
    <meta property="og:title" content="एडमिन डैशबोर्ड - सटुन कंस्ट्रक्शन" />
    <meta property="og:description" content="मीडिया अपलोड और प्रबंधन के लिए सुरक्षित डैशबोर्ड।" />
    <meta property="og:type" content="website" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F7FAFC; }
    </style>
<script>(function(){try{var P="/satun-construction-portfolio";if(location.pathname.indexOf(P+"/")!==0&&location.pathname!==P)return;function fix(u){if(typeof u!=="string")return u;if(u.charAt(0)==="/"&&u.charAt(1)!=="/"&&u.indexOf(P+"/")!==0&&u!==P)return P+u;return u;}var _a=history.pushState;history.pushState=function(s,t,u){return _a.call(this,s,t,fix(u));};var _r=history.replaceState;history.replaceState=function(s,t,u){return _r.call(this,s,t,fix(u));};document.addEventListener("click",function(e){var t=e.target;while(t&&t.tagName!=="A")t=t.parentNode;if(!t||!t.getAttribute)return;var h=t.getAttribute("href");if(!h||h.charAt(0)!=="/"||h.charAt(1)==="/")return;if(h.indexOf(P+"/")===0||h===P)return;t.setAttribute("href",P+h);},true);}catch(_){}})();</script></head>
<body>

    
    <script>
        (function() {
            if (!window.GizoAuth || !window.GizoAuth.getUser()) {
                window.location.href = '/login';
            }
        })();
    </script>

    <div class="min-h-screen flex">
        
        <aside class="w-64 bg-[#2D3748] text-white flex-shrink-0 hidden md:block">
            <div class="p-6 font-bold text-xl border-b border-white/10">सटुन एडमिन</div>
            <nav class="p-4 space-y-2">
                <a href="/satun-construction-portfolio/admin-upload" class="flex items-center gap-3 p-3 bg-[#D69E2E] rounded-xl font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    मीडिया अपलोड
                </a>
                <a href="/" class="flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    मुख्य वेबसाइट
                </a>
            </nav>
        </aside>

        
        <main class="flex-1">
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-10">
                <h1 class="font-semibold text-slate-800">प्रोजेक्ट मीडिया प्रबंधन</h1>
                <button class="text-sm text-red-600 hover:text-red-700 font-medium">लॉग आउट</button>
            </header>

            <div class="p-8 max-w-5xl mx-auto space-y-8">
                
                <section class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
                    <h2 class="text-lg font-semibold mb-4 text-slate-800">नया मीडिया अपलोड करें</h2>
                    <div id="dropzone" class="border-2 border-dashed border-slate-300 rounded-2xl p-10 flex flex-col items-center justify-center text-center hover:border-[#D69E2E] transition cursor-pointer">
                        <svg class="w-12 h-12 text-slate-400 mb-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        <p class="text-slate-600 font-medium">मीडिया खींचें और छोड़ें</p>
                        <p class="text-xs text-slate-400 mt-1">JPEG, PNG, या MP4 (अधिकतम 50MB)</p>
                    </div>
                </section>

                
                <section class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                        <h2 class="font-semibold text-slate-800">हालिया प्रोजेक्ट्स</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-slate-50 text-slate-500 uppercase text-xs tracking-wider">
                                <tr>
                                    <th class="px-6 py-4">प्रोजेक्ट</th>
                                    <th class="px-6 py-4">प्रकार</th>
                                    <th class="px-6 py-4">दिनांक</th>
                                    <th class="px-6 py-4">कार्रवाई</th>
                                </tr>
                            </thead>
                            <tbody id="media-table-body" class="divide-y divide-slate-100">
                                
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <script>
        // API Wrapper
        const api = {
            list: (col) => window.GizoData.list(col, { order: 'created_at desc' }),
            remove: (col, id) => window.GizoData.remove(col, id),
            create: (col, data) => window.GizoData.create(col, data)
        };

        function showToast(title, variant = 'success') {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `p-4 rounded-xl shadow-lg border text-sm ${variant === 'success' ? 'bg-white border-green-200 text-green-800' : 'bg-white border-red-200 text-red-800'}`;
            el.textContent = title;
            container.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        async function render() {
            const tbody = document.getElementById('media-table-body');
            try {
                const data = await api.list('projects');
                tbody.innerHTML = data.length ? data.map(item => `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-4 font-medium">${item.data.name || 'अज्ञात प्रोजेक्ट'}</td>
                        <td class="px-6 py-4 text-slate-500">${item.data.type || 'फोटो'}</td>
                        <td class="px-6 py-4 text-slate-500">${new Date(item.created_at).toLocaleDateString('hi-IN')}</td>
                        <td class="px-6 py-4">
                            <button onclick="deleteItem('${item.id}')" class="text-red-600 hover:text-red-800 text-xs font-semibold uppercase">हटाएं</button>
                        </td>
                    </tr>
                `).join('') : `<tr><td colspan="4" class="p-8 text-center text-slate-400">कोई डेटा नहीं मिला।</td></tr>`;
            } catch(e) { console.error(e); }
        }

        async function deleteItem(id) {
            if(!confirm('क्या आप निश्चित हैं?')) return;
            await api.remove('projects', id);
            showToast('मीडिया सफलतापूर्वक हटाया गया।');
            render();
        }

        // Dropzone simulation
        document.getElementById('dropzone').addEventListener('click', async () => {
            const name = prompt('मीडिया का शीर्षक डालें:');
            if(!name) return;
            await api.create('projects', { name, type: 'फोटो', status: 'active' });
            showToast('मीडिया सफलतापूर्वक अपलोड किया गया।');
            render();
        });

        render();
    </script>
</body>
</html>
